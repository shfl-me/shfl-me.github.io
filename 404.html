<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon16.png">
<link rel="icon" type="image/png" sizes="24x24" href="/icons/icon24.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon32.png">
<link rel="icon" type="image/png" sizes="64x64" href="/icons/icon64.png">
<link rel="icon" type="image/png" sizes="128x128" href="/icons/icon128.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icons/icon512.png">
  <title>Redirecting...</title>
  <script>
    const path = window.location.pathname.replace(/^\/+/, "").trim();

    const shelfSlugs = [
      "bass",
      "bass-gear",
      "kitchen",
      "route-66",
      "gift-ideas",
      "church-tech",
      "rich",
      "jo",
      "charlie"
    ];

    if (!path) {
      window.location.replace("https://shareshuffle.com");
    } else if (shelfSlugs.includes(path.toLowerCase())) {
      window.location.replace(`https://shelfmix.com/${path}`);
    } else {
      window.location.replace(`https://shareshuffle.com/share.html?id=${path}`);
    }
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
