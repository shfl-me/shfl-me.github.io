<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon16.png">
<link rel="icon" type="image/png" sizes="24x24" href="/icons/icon24.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon32.png">
<link rel="icon" type="image/png" sizes="64x64" href="/icons/icon64.png">
<link rel="icon" type="image/png" sizes="128x128" href="/icons/icon128.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icons/icon512.png">
  <title>Redirecting...</title>
  <script>
    const path = window.location.pathname.replace(/^\/+/, "").trim();
    const parts = path.split("/").filter(Boolean);

    const shelfSlugs = [
      "bass",
      "bass-gear",
      "kitchen",
      "route-66",
      "gift-ideas",
      "church-tech",
      "rich",
      "jo",
      "charlie"
    ];

    if (!path) {
      window.location.replace("https://shareshuffle.com");
    } else if (parts[0]?.startsWith("@") && parts.length >= 3) {
      // Temporary @handle route:
      // /@rich/bass/a2c4e -> final segment is still the share id.
      const id = parts[parts.length - 1];
      window.location.replace(`https://shareshuffle.com/share.html?id=${encodeURIComponent(id)}`);
    } else if (parts[0]?.startsWith("@") && parts.length >= 2) {
      // Temporary @handle shelf route:
      // /@rich/bass -> preserve both handle and shelf.
      const handle = parts[0].replace(/^@+/, "");
      const shelfSlug = parts[1];
      window.location.replace(`https://shareshuffle.com/shelf.html?u=${encodeURIComponent(handle)}&s=${encodeURIComponent(shelfSlug)}`);
    } else if (parts[0] === "u" && parts.length >= 4) {
      const id = parts[parts.length - 1];
      window.location.replace(`https://shareshuffle.com/share.html?id=${encodeURIComponent(id)}`);
    } else if (parts[0] === "u" && parts.length >= 3) {
      const shelfSlug = parts[2];
      window.location.replace(`https://shareshuffle.com/shelf.html?s=${encodeURIComponent(shelfSlug)}`);
    } else if (shelfSlugs.includes(parts[0].toLowerCase())) {
      window.location.replace(`https://shareshuffle.com/shelf.html?s=${encodeURIComponent(parts[0])}`);
    } else {
      window.location.replace(`https://shareshuffle.com/share.html?id=${encodeURIComponent(parts[0])}`);
    }
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
