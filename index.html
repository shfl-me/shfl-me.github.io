<html>
<head>
  <meta charset="utf-8">
  <meta name='impact-site-verification' value='65a0ec4f-a4ce-44e0-8cf4-5a8125dac59e'>
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon16.png">
<link rel="icon" type="image/png" sizes="24x24" href="/icons/icon24.png">

<link rel="icon" type="image/png" sizes="512x512" href="/icons/icon512.png">
  <title>Redirecting...</title>
  <script>
    const path = window.location.pathname.replace(/^\/+/, "").trim();
    const parts = path.split("/").filter(Boolean);

    if (!path) {
      window.location.replace("https://shareshuffle.com");
    } else if (parts[0]?.startsWith("@") && parts.length >= 3) {
      // Temporary @handle route:
      // /@rich/bass/a2c4e -> final segment is still the share id.
      const id = parts[parts.length - 1];
      window.location.replace(`https://shareshuffle.com/share.html?id=${encodeURIComponent(id)}`);
    } else if (parts[0]?.startsWith("@") && parts.length >= 2) {
      // Temporary @handle shelf route:
      // /@rich/bass -> route to shelf slug for now.
      const shelfSlug = parts[1];
      window.location.replace(`https://shareshuffle.com/shelf.html?s=${encodeURIComponent(shelfSlug)}`);
    } else if (parts[0] === "u" && parts.length >= 4) {
      // Temporary username path:
      // /u/rich/bass/a2c4e -> the final segment is still the share id.
      const id = parts[parts.length - 1];
      window.location.replace(`https://shareshuffle.com/share.html?id=${encodeURIComponent(id)}`);
    } else if (parts[0] === "u" && parts.length >= 3) {
      // Temporary shelf route:
      // /u/rich/bass -> route to shelf slug for now.
      const shelfSlug = parts[2];
      window.location.replace(`https://shareshuffle.com/shelf.html?s=${encodeURIComponent(shelfSlug)}`);
    } else {
      const code = parts[0];
      window.location.replace(`https://shareshuffle.com/share.html?id=${encodeURIComponent(code)}`);
    }
  </script>
</head>
<body>
  Redirecting to ShareShuffle...
